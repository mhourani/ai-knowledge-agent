# ============================================================================
# Horizontal Pod Autoscaler
#
# Only created when agent.autoscaling.enabled=true.
# Scales the agent deployment based on CPU and memory utilization.
#
# For AI workloads, you might also want to scale based on custom
# metrics like request queue depth or LLM API latency — that
# requires the Prometheus adapter or KEDA.
# ============================================================================

{{- if .Values.agent.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "ai-knowledge-agent.fullname" . }}
  labels:
    {{- include "ai-knowledge-agent.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "ai-knowledge-agent.fullname" . }}
  minReplicas: {{ .Values.agent.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.agent.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.agent.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.agent.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
