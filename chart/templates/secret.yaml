# ============================================================================
# Secret — stores API keys and sensitive credentials
#
# WARNING: In production, do NOT store secrets in Helm values.
# Use one of these instead:
#   - AWS Secrets Manager + External Secrets Operator
#   - Azure Key Vault + CSI Secrets Store Driver
#   - HashiCorp Vault
#   - Sealed Secrets (Bitnami)
#
# This Secret exists for development and demo purposes.
# ============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-knowledge-agent.fullname" . }}
  labels:
    {{- include "ai-knowledge-agent.labels" . | nindent 4 }}
type: Opaque
data:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.microsoftClientId }}
  MICROSOFT_CLIENT_ID: {{ .Values.secrets.microsoftClientId | b64enc | quote }}
  {{- end }}
