# ============================================================================
# Agent Service
#
# Exposes the Streamlit application within the cluster.
# Use ClusterIP (default) with an Ingress for production,
# or LoadBalancer for quick testing.
# ============================================================================

apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-knowledge-agent.fullname" . }}
  labels:
    {{- include "ai-knowledge-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "ai-knowledge-agent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: agent
