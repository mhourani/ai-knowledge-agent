# ============================================================================
# ChromaDB Service
#
# Internal-only service — ChromaDB should not be exposed outside
# the cluster. The agent connects to it via Kubernetes DNS:
#   CHROMA_HOST=<release>-ai-knowledge-agent-chroma
#
# This is the same pattern as docker-compose, just using Kubernetes
# Service discovery instead of Docker network aliases.
# ============================================================================

{{- if .Values.chroma.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-knowledge-agent.chromaName" . }}
  labels:
    {{- include "ai-knowledge-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: chroma
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.chroma.port }}
      targetPort: {{ .Values.chroma.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "ai-knowledge-agent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: chroma
{{- end }}
